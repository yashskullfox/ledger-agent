spring:
  application:
    name: ledger-agent-webapp

  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false   # set true in prod

server:
  port: ${PORT:8080}
  shutdown: graceful

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

# ── Ledger-agent bridge ────────────────────────────────────────────────────────
ledger:
  python-home: ${LEDGER_PYTHON_HOME:}
  default-fiscal-year: ${LEDGER_DEFAULT_FISCAL_YEAR:2024}

  # Display labels — set via env var or K8s ConfigMap; never hardcode real names here
  app-title:       ${LEDGER_APP_TITLE:Financial Intelligence}
  app-badge:       ${LEDGER_APP_BADGE:Form D}
  partner-a-label: ${LEDGER_PARTNER_A_LABEL:Partner A (99%)}
  partner-b-label: ${LEDGER_PARTNER_B_LABEL:Partner B (1%)}

logging:
  level:
    root: WARN
    com.ledgeragent: INFO
