<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ledger-agent — Results</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa; color: #222; margin: 0; padding: 0;
    }
    header {
      background: #1a1f36; color: #fff; padding: 1.2rem 2rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    header h1 { margin: 0; font-size: 1.35rem; font-weight: 600; }
    header a { color: #a5b4fc; font-size: .9rem; text-decoration: none; margin-left: auto; }
    header a:hover { text-decoration: underline; }
    main { max-width: 820px; margin: 2.5rem auto; padding: 0 1.5rem; }

    /* Status banner */
    .banner {
      border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem;
      font-weight: 600; font-size: .95rem;
    }
    .banner.success { background: #d3f9d8; color: #1c7c2b; border: 1.5px solid #8ce99a; }
    .banner.error   { background: #ffe3e3; color: #c92a2a; border: 1.5px solid #ffa8a8; }

    /* Next-step suggestion */
    .next-step {
      background: #e7f5ff; border: 1.5px solid #74c0fc; border-radius: 8px;
      padding: .75rem 1rem; margin-bottom: 1.5rem; font-size: .9rem; color: #1864ab;
    }
    .next-step strong { display: block; margin-bottom: .2rem; }

    /* Result card */
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { margin-top: 0; font-size: 1rem; color: #1a1f36; }
    pre {
      background: #f1f3f5; border-radius: 8px; padding: 1rem;
      overflow: auto; font-size: .85rem; line-height: 1.6;
      max-height: 520px; white-space: pre-wrap; word-break: break-word;
    }

    /* Error detail */
    .error-detail {
      background: #fff5f5; border: 1.5px solid #ffa8a8; border-radius: 8px;
      padding: 1rem; font-family: monospace; font-size: .85rem; color: #c92a2a;
      margin-bottom: 1.5rem; white-space: pre-wrap; word-break: break-word;
    }

    .back-btn {
      display: inline-block; background: #4c6ef5; color: #fff;
      border-radius: 8px; padding: .6rem 1.5rem; text-decoration: none;
      font-weight: 600; font-size: .95rem;
    }
    .back-btn:hover { background: #3b5bdb; }
    .meta { font-size: .82rem; color: #888; margin-bottom: 1rem; }
  </style>
</head>
<body>

<header>
  <h1>📒 ledger-agent</h1>
  <a href="/">← Back to reports</a>
</header>

<main>

  <!-- Status banner -->
  <div th:if="${success}" class="banner success">
    ✅ Report completed successfully
  </div>
  <div th:unless="${success}" class="banner error">
    ❌ Report failed
  </div>

  <!-- Report metadata -->
  <p class="meta">
    Report: <strong th:text="${report}">—</strong> &nbsp;|&nbsp;
    Fiscal year: <strong th:text="${fiscalYear}">—</strong>
  </p>

  <!-- Next-step suggestion -->
  <div th:if="${nextStep != null and !#strings.isEmpty(nextStep)}" class="next-step">
    <strong>💡 Suggested next step</strong>
    <span th:text="${nextStep}"></span>
  </div>

  <!-- Error detail -->
  <div th:unless="${success}" class="error-detail" th:text="${errorMessage}"></div>

  <!-- JSON result -->
  <div th:if="${success and resultJson != null}" class="card">
    <h2>Raw Result (JSON)</h2>
    <pre th:text="${resultJson}"></pre>
  </div>

  <a class="back-btn" href="/">← Run another report</a>

</main>

</body>
</html>
