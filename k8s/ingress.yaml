## k8s/ingress.yaml — optional external access via nginx-ingress
## Only apply if you want the webapp reachable outside the cluster.
## For internal-only use, skip this and port-forward instead:
##   kubectl port-forward svc/ledger-agent 8080:80
##
## Requirements:
##   - nginx-ingress-controller installed in your cluster
##   - cert-manager for automatic TLS (optional but recommended)
##
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ledger-agent
  labels:
    app: ledger-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    ## Uncomment for automatic TLS via cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ## Uncomment and add your TLS secret for HTTPS:
  # tls:
  #   - hosts:
  #       - ledger.your-domain.internal
  #     secretName: ledger-agent-tls
  rules:
    - host: ledger.your-domain.internal   ## ← change this
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ledger-agent
                port:
                  number: 80
